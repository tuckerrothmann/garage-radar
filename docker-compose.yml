version: "3.9"

services:
  db:
    image: postgres:15-alpine
    container_name: garage_radar_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: garage_radar
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./db/seed/canonical_models.sql:/docker-entrypoint-initdb.d/02_seed_canonical_models.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d garage_radar"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: garage_radar_api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/garage_radar
      SNAPSHOT_STORE_PATH: /app/data/snapshots
      LOG_LEVEL: INFO
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./data:/app/data
    command: uvicorn garage_radar.api.main:app --host 0.0.0.0 --port 8000 --reload
    profiles:
      - full  # Only start with: docker-compose --profile full up

volumes:
  pg_data:
